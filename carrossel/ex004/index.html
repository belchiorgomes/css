<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,*::after,*::before{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel{
            position: relative;
            width: 600px;
            aspect-ratio: 16 / 9;
            border-radius: .8rem;
            overflow-x: auto;
            display: flex;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            anchor-name: --btn;
            /* scroll-marker-group: after; */

            &::-webkit-scrollbar{
                display: none;
            }

            &::scroll-button(right),
            &::scroll-button(left){
                position: absolute;
                position-anchor: --btn;
            }

            &::scroll-button(right){
                content: '➡️';
                right: calc(anchor(right) - 20px);
            }

            &::scroll-button(left){
                content: '⬅️';
                left: calc(anchor(left) - 20px);
            }

            &::scroll-marker-group{
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                width: 100%;
                background-color: aqua;
                
            }

            .carrossel-img{
                position: relative;
                flex: 1 0 100%;
                height: 100%;
                scroll-snap-align: start;

                img{
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }
        }
    </style>
</head>
<body>
    <section class="carrossel">
        <div class="carrossel-img"><img src="img/img01.jpg" alt="imagem 01"></div>
        <div class="carrossel-img"><img src="img/img02.jpg" alt="imagem 01"></div>
        <div class="carrossel-img"><img src="img/img03.jpg" alt="imagem 01"></div>
    </section>
</body>
</html>
