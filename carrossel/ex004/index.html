<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *, *::after, *::before {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel {
            width: 600px;
            aspect-ratio: 16 / 9;
            border-radius: .8rem;
            overflow-x: auto;           /* ✅ era overflow: hidden — bloqueava o scroll */
            overflow-y: hidden;
            display: flex;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            anchor-name: --btn;
            scroll-marker-group: after;

            &::-webkit-scrollbar {
                display: none;
            }

            /* ✅ display: inline-block para width/height funcionarem */
            .carrossel-img::scroll-marker {
                content: '';
                display: inline-block;
                width: 1em;
                height: 1em;
                border-radius: 50%;
                background-color: #0e004b;
                opacity: 0.3;
            }

            /* ✅ estado ativo do marker */
            .carrossel-img::scroll-marker:target-current {
                opacity: 1;
            }

            &::scroll-marker-group {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: .5rem;
                padding: .5rem;
            }

            &::scroll-button(left),
            &::scroll-button(right) {
                content: '➡️';
                position: fixed;
                position-anchor: --btn;
                position-area: right center;
                translate: -50%;
            }

            &::scroll-button(left) {
                content: '⬅️';
                position-area: left center;
                translate: 50%;
            }
        }

        .carrossel-img {
            flex: 1 0 100%;
            height: 100%;
            scroll-snap-align: start;

            img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <section class="carrossel">
        <div class="carrossel-img"><img src="img/img01.jpg" alt="imagem 01"></div>
        <div class="carrossel-img"><img src="img/img02.jpg" alt="imagem 02"></div>
        <div class="carrossel-img"><img src="img/img03.jpg" alt="imagem 03"></div>
    </section>
</body>
</html>
