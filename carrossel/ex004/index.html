<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *, *::after, *::before {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel{
            position: relative;
            width: 600px;
            aspect-ratio: 16 / 9;
            border-radius: .8rem;
            overflow-x: auto;
            display: flex;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            anchor-name: --btn;
            scroll-marker-group: after;
        }

        .carrossel::scroll-marker-group{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: .5rem;
            height: 2rem; /* necessário! */
        }

        .carrossel::-webkit-scrollbar{
            display: none;
        }

        .carrossel::scroll-button(right),
        .carrossel::scroll-button(left){
            position: fixed;
            content: '➡️';
            position-anchor: --btn;
            position-area: right center;
            translate: -50%;
            
        }

        .carrossel::scroll-button(left){
            content: '⬅️';
            position-area: left center;
            translate: 50%;
        }

        .carrossel .carrossel-img{
            flex: 1 0 100%;
            height: 100%;
            scroll-snap-align: start;
        }

        .carrossel .carrossel-img::scroll-marker{
            content: '';
            width: 1em;
            height: 1em;
            background-color: #c2c2c2;
            border-radius: 50%;
        }

        .carrossel .carrossel-img::scroll-marker:target-current {
            background-color: #333; /* bolinha ativa */
        }

        .carrossel .carrossel-img img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <section class="carrossel">
        <div class="carrossel-img"><img src="img/img01.jpg" alt="imagem 01"></div>
        <div class="carrossel-img"><img src="img/img02.jpg" alt="imagem 02"></div>
        <div class="carrossel-img"><img src="img/img03.jpg" alt="imagem 03"></div>
    </section>
</body>
</html>
