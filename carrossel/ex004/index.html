<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,*::after,*::before{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel{
            position: relative;
            width: 600px;
            aspect-ratio: 16 / 9;
            border-radius: .8rem;
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            anchor-name: --btn;

            &::-webkit-scrollbar{
                display: none;
            }

            &::scroll-button(left),
            &::scroll-button(right){
                position: absolute;
                width: 60px;
                height: 60px;
                background-color: transparent;
                border-radius: 22px;
                border: none;
                outline: none;
                font-size: 1.8rem;
                background-color: coral;
                position-anchor: --btn;
                top: 50%;
                transform: translateY(-50%);
            }

            &::scroll-button(left){
                content: '⬅';
                left: anchor(left);
            }

            &::scroll-button(right){
                content: '>';
                right: anchor(right);
            }

            .carrossel-img{
                flex: 1 0 100%;
                height: 100%;
                scroll-snap-align: start;

                img{
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }
        }
    </style>
</head>
<body>
    <section class="carrossel">
        <div class="carrossel-img"><img src="img/img01.jpg" alt="imagem 01"></div>
        <div class="carrossel-img"><img src="img/img02.jpg" alt="imagem 01"></div>
        <div class="carrossel-img"><img src="img/img03.jpg" alt="imagem 01"></div>
    </section>
</body>
</html>
