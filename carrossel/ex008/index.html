<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel 3D</title>
    <style>
        *,*::after,*::before{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root{
            --largura: 250px;
            --altura: 180px;
            --total-itens: 6;
            --angle: calc(360deg / var(--total-itens));
            --translateZ: 250px;
        }

        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-flow: column nowrap;
            gap: 3rem;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: var(--largura);
            height: var(--altura);
            perspective: 1900px;

            .carrossel{
                position: relative;
                width: 100%;
                height: 100%;
                transform-style: preserve-3d;
                transition: all .6s ease-in-out;

                .item{
                    position: absolute;
                    inset: 0 0 0 0;
                    background-color: rgb(84, 105, 122);
                    border-radius: .8rem;
                    display: grid;
                    place-items: center;

                    &:nth-child(1){transform: rotateY(calc(var(--angle) * 0)) translateZ(var(--translateZ));}
                    &:nth-child(2){transform: rotateY(calc(var(--angle) * 1)) translateZ(var(--translateZ));}
                    &:nth-child(3){transform: rotateY(calc(var(--angle) * 2)) translateZ(var(--translateZ));}
                    &:nth-child(4){transform: rotateY(calc(var(--angle) * 3)) translateZ(var(--translateZ));}
                    &:nth-child(5){transform: rotateY(calc(var(--angle) * 4)) translateZ(var(--translateZ));}
                    &:nth-child(6){transform: rotateY(calc(var(--angle) * 5)) translateZ(var(--translateZ));}
                }
            }
        }

        .controle{
            display: flex;
            gap: 3rem;

            button{
                border: 2px solid black;
                border-radius: .8rem;
                padding: 12px 18px;
                transition: all .6s ease-in-out;

                &:hover{
                    background-color: black;
                    color: white;
                    transform: translateY(-3px);
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="carrossel">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
        </div>
    </div>

    <div class="controle">
        <button id="prev">Anterior</button>
        <button id="next">Proximo</button>
    </div>

    <script>
        const carrossel = document.querySelector('.carrossel');
        const btnPrev = document.getElementById('prev');
        const btnNext = document.getElementById('next');

        let rotacao = 0;
        const step = 360 / 6;

        function movimentoCarrossel(){
            carrossel.style.transform = `rotateY(${rotacao}deg)`;
        }

        btnNext.addEventListener('click', () => {
            rotacao -= step;
            movimentoCarrossel();
        });

        btnPrev.addEventListener('click', () => {
            rotacao += step;
            movimentoCarrossel();
        })
    </script>
</body>
</html>
