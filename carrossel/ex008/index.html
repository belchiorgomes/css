<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carrossel 3d</title>
    <style>
        *,*::after,*::before{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root{
            --total-item: 6;
            --angle: calc(360deg / var(--total-item));
            --translate-z: 250px;
        }

        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 200px;
            height: 350px;
            perspective: 1200px;

            .carrossel{
                position: relative;
                width: 100%;
                height: 100%;
                transform-style: preserve-3d;

                .item{
                    position: absolute;
                    left: 0;
                    bottom: 0;
                    inset: 0 0 0 0;
                    border-radius: .8rem;
                    background-color: rgb(60, 72, 82);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    backface-visibility: visible;
                    color: white;
                    font-size: 1.2rem;

                    &:nth-child(1){transform: rotateY(calc(var(--angle) * 0)) translateZ(var(--translate-z));}
                    &:nth-child(2){transform: rotateY(calc(var(--angle) * .6)) translateZ(var(--translate-z));}
                    &:nth-child(3){transform: rotateY(calc(var(--angle) * .6)) translateZ(var(--translate-z));}
                    &:nth-child(4){transform: rotateY(calc(var(--angle) * 3)) translateZ(var(--translate-z));}
                    &:nth-child(5){transform: rotateY(calc(var(--angle) * 4)) translateZ(var(--translate-z));}
                    &:nth-child(6){transform: rotateY(calc(var(--angle) * 5)) translateZ(var(--translate-z));}
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="carrossel">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
        </div>
    </div>
</body>
</html>
