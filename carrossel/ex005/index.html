<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="radio" name="btn" id="slide01" checked>
    <input type="radio" name="btn" id="slide02">
    <input type="radio" name="btn" id="slide03">

    <div class="carrossel">
        <div class="container-carrossel">
            <div class="carrossel-img" style="--bg:url('img/img01.jpg')"></div>

            <div class="carrossel-img" style="--bg:url('img/img02.jpg')"></div>

            <div class="carrossel-img" style="--bg:url('img/img03.jpg')"></div>
        </div>

        <div class="controle">
            <label for="slide01">
                <img src="img/img01.jpg" alt="foto">
            </label>

            <label for="slide02">
                <img src="img/img02.jpg" alt="foto">
            </label>

            <label for="slide03">
                <img src="img/img03.jpg" alt="foto">
            </label>
        </div>
    </div>
</body>
</html>
