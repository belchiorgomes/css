<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel 3D Moderno</title>
    <style>
        :root {
            --item-width: 250px;
            --item-height: 180px;
            --total-items: 6;
            /* Cálculo do ângulo para cada item */
            --angle: calc(360deg / var(--total-items));
            /* Distância do centro para evitar sobreposição */
            --translate-z: 250px;
        }

        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Palco onde o 3D acontece */
        .scene {
            width: var(--item-width);
            height: var(--item-height);
            perspective: 1200px; /* Profundidade do ambiente */
            margin-bottom: 80px;
        }

        /* O contêiner que gira */
        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .carousel__item {
            position: absolute;
            width: var(--item-width);
            height: var(--item-height);
            left: 0;
            top: 0;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            backface-visibility: visible; /* Mude para 'hidden' se quiser esconder o fundo */
        }

        /* Posicionamento dinâmico usando o índice */
        .carousel__item:nth-child(1) { transform: rotateY(calc(var(--angle) * 0)) translateZ(var(--translate-z)); }
        .carousel__item:nth-child(2) { transform: rotateY(calc(var(--angle) * 1)) translateZ(var(--translate-z)); }
        .carousel__item:nth-child(3) { transform: rotateY(calc(var(--angle) * 2)) translateZ(var(--translate-z)); }
        .carousel__item:nth-child(4) { transform: rotateY(calc(var(--angle) * 3)) translateZ(var(--translate-z)); }
        .carousel__item:nth-child(5) { transform: rotateY(calc(var(--angle) * 4)) translateZ(var(--translate-z)); }
        .carousel__item:nth-child(6) { transform: rotateY(calc(var(--angle) * 5)) translateZ(var(--translate-z)); }

        /* Controles */
        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            background: #ffffff15;
            color: white;
            border: 2px solid #ffffff30;
            border-radius: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="carousel">
            <div class="carousel__item">1</div>
            <div class="carousel__item">2</div>
            <div class="carousel__item">3</div>
            <div class="carousel__item">4</div>
            <div class="carousel__item">5</div>
            <div class="carousel__item">6</div>
        </div>
    </div>

    <div class="controls">
        <button id="prev">Anterior</button>
        <button id="next">Próximo</button>
    </div>

    <script>
        const carousel = document.querySelector('.carousel');
        const nextBtn = document.getElementById('next');
        const prevBtn = document.getElementById('prev');
        
        let rotationDegree = 0;
        const step = 360 / 6; // Ângulo para 6 itens

        nextBtn.addEventListener('click', () => {
            rotationDegree -= step;
            updateRotation();
        });

        prevBtn.addEventListener('click', () => {
            rotationDegree += step;
            updateRotation();
        });

        function updateRotation() {
            carousel.style.transform = `rotateY(${rotationDegree}deg)`;
        }

        // Suporte para teclas direcionais
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextBtn.click();
            if (e.key === 'ArrowLeft') prevBtn.click();
        });
    </script>
</body>
</html>
