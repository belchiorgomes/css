<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,*::after,*::before{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel{
            position: relative;
            width: 600px;
            aspect-ratio: 16 / 9;
            display: flex;
            gap: .5rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            anchor-name: --btn;

            input[type='radio']{
                display: none;
            }

            &::-webkit-scrollbar{
                display: none;
            }

            &::scroll-button(right),
            &::scroll-button(left){
                position: fixed;
                content: '→';
                border: none;
                border-radius: .5rem;
                outline: none;
                font-size: 33px;
                color: white;
                background-color: black;
                position-anchor: --btn;
                position-area: right center;
                translate: -50%;
                transition: all .6s ease-in-out;
            }

            &::scroll-button(left){
                content: '←';
                position-area: left center;
                translate: 50%;
            }

            &::scroll-button(right):disabled,
            &::scroll-button(left):disabled{
                scale: .8;
                opacity: .6;
            }

            .slides{
                flex: 0 0 100%;
                height: 100%;
                border-radius: .8rem;
                overflow: hidden;
                scroll-snap-align: start;
                transition: all .6s ease-in-out;

                img{
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }

            .controles{
                position: fixed;
                width: 100%;
                padding: 12px;
                display: flex;
                gap: .5rem;

                label{
                    flex: 0 0 12px;
                    height: 12px;
                    border-radius: 50%;
                    background-color: rgb(65, 129, 185);
                }
            }
        }
    </style>
</head>
<body>
    <div class="carrossel">
        <input type="radio" name="slides" id="slide01" checked>
        <input type="radio" name="slides" id="slide02">
        <input type="radio" name="slides" id="slide03">
        <input type="radio" name="slides" id="slide04">
        <input type="radio" name="slides" id="slide05">
        <input type="radio" name="slides" id="slide06">

        <div for="slide01" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 01">
        </div>

        <div for="slide02" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 02">
        </div>

        <div for="slide03" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 03">
        </div>

        <div for="slide04" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 04">
        </div>

        <div for="slide05" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 05">
        </div>

        <div for="slide06" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 06">
        </div>

        <div class="controles">
            <label for="slide01"></label>
            <label for="slide02"></label>
            <label for="slide03"></label>
            <label for="slide04"></label>
            <label for="slide05"></label>
            <label for="slide06"></label>
        </div>
    </div>
</body>
</html>
