<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,*::after,*::before{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel{
            position: relative;
            width: 800px;
            aspect-ratio: 9 / 3;
            border-radius: .8rem;
            display: flex;
            gap: .5rem;
            overflow-x: auto;

            input[type='radio']{
                display: none;
            }

            &::-webkit-scrollbar{
                display: none;
            }

            &::scroll-button(right),
            &::scroll-button(left){
                position: fixed;
                content: '→';
                width: 50px;
                height: 40px;
                background-color: coral;
                border: none;
                border-radius: .3rem;
                outline: none;
                font-size: 33px;
                text-align: center;
                line-height: 40px;
            }

            &::scroll-button(left){
                content: '←';
            }

            .slides{
                flex: 1 0 50%;
                height: 100%;
                border-radius: .8rem;
                overflow: hidden;

                img{
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }
        }
    </style>
</head>
<body>
    <div class="carrossel">
        <input type="radio" name="slides" id="slide01" checked>
        <input type="radio" name="slides" id="slide02">
        <input type="radio" name="slides" id="slide03">
        <input type="radio" name="slides" id="slide04">
        <input type="radio" name="slides" id="slide05">
        <input type="radio" name="slides" id="slide06">

        <label for="slide01" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 01">
        </label>

        <label for="slide02" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 02">
        </label>

        <label for="slide03" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 03">
        </label>

        <label for="slide04" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 04">
        </label>

        <label for="slide05" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 05">
        </label>

        <label for="slide06" class="slides">
            <img src="https://picsum.photos/600/600" alt="imagem 06">
        </label>
    </div>
</body>
</html>
