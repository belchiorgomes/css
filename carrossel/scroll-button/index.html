<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>::scroll-button</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrossel{
            width: 700px;
            display: flex;
            gap: 1.3rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            anchor-name: --btn;
            scroll-snap-type: x mandatory;

            &::-webkit-scrollbar{
                display: none;
            }

            &::scroll-button(right), &::scroll-button(left){
                content: '➡️';
                position: fixed;
                position-anchor: --btn;
                position-area: right center;
                translate: -50%;
            }

            &::scroll-button(left){
                content: '⬅️';
                position-anchor: --btn;
                position-area: left center;
                translate: 50%;
            }

            .cards{
                scroll-snap-align: start;
                flex: 0 0 100%;
                height: 150px;
                border-radius: .8rem;
                background-color: antiquewhite;
                text-align: center;
                line-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="carrossel">
        <div class="cards">01</div>
        <div class="cards">02</div>
        <div class="cards">03</div>
        <div class="cards">04</div>
        <div class="cards">05</div>
        <div class="cards">06</div>
        <div class="cards">07</div>
        <div class="cards">08</div>
    </div>
</body>
</html>
