<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Animation</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 100%;
            overflow: hidden;

            .scroll{
                display: flex;
                gap: 1rem;
                width: max-content;
                animation: scroll 10s linear infinite;

                &:hover{
                    animation-play-state: paused;
                }

                .box{
                    flex: 0 0 auto;
                    width: 300px;
                    height: 200px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    border-radius: .8rem;
                    background-color: coral;
                }
            }
        }

        @keyframes scroll{
            from{
                transform: translateX(0);
            }
            to{
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scroll">
            <div class="box">box 01</div>
            <div class="box">box 02</div>
            <div class="box">box 03</div>
            <div class="box">box 04</div>
            <div class="box">box 05</div>

            <div class="box">box 01</div>
            <div class="box">box 02</div>
            <div class="box">box 03</div>
            <div class="box">box 04</div>
            <div class="box">box 05</div>
        </div>
    </div>
</body>
</html>
