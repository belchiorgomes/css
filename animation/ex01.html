<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
        }

        .box{
            position: absolute;
            transform: translate(100%, 100%);
            width: 200px;
            height: 200px;
            border-radius: .8rem;
            background-color: coral;
            transition: all .6s linear;

            &:hover{
                transform: translate(0, 0) rotate(365deg) scale(2);
                background-color: aqua;
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
