<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mask-imagem css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 400px;
            height: 400px;
            overflow: hidden;
            /* mask-image: url(imagem/img03.png);
            mask-size: 50%;
            mask-repeat: no-repeat;
            mask-position: center; */

            mask-image: linear-gradient(top to right, black, transparent);

            img{
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="imagem/img03.jpg" alt="foto">
    </div>
</body>
</html>
